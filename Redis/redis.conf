# Redis config for hft-ipc-bench (Unix Domain Socket, no persistence)
port 0
unixsocket /tmp/redis_bench.sock
unixsocketperm 777

# Disable persistence to minimize latency variance
save ""
appendonly no

# Reduce logging noise
loglevel warning

# Increase max clients for multi-consumer tests
maxclients 32

# Disable Nagle-like delays (applies to TCP, not UDS, but good practice)
tcp-backlog 511
